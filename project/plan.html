<!doctype html>
<html lang="en-US">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lima Travel Guide | Plan Your Visit</title>
  <meta name="description" content="Use this planning form to build a simple travel plan for Lima, Peru.">
  <meta name="author" content="Omar Lizandro">
  <link rel="stylesheet" href="styles/site.css">
  <script src="scripts/main.js" defer></script>
</head>
<body>
  <header class="site-header">
    <div class="container nav-wrap">
      <a class="brand" href="index.html">Lima Travel Guide</a>

      <button
        id="menuButton"
        class="menu-button"
        type="button"
        aria-label="Open navigation menu"
        aria-expanded="false"
        aria-controls="primaryNav"
      >
        ☰
      </button>

      <nav id="primaryNav" class="navigation">
        <a href="index.html">Home</a>
        <a href="places.html">Places</a>
        <a href="food.html">Food</a>
        <a href="plan.html" aria-current="page">Plan</a>
      </nav>
    </div>
  </header>

  <main class="container section">
    <h1>Plan Your Visit</h1>
    <p class="page-intro">Save a simple travel preference using the form below.</p>

    <div class="two-column">
      <form id="tripForm" class="trip-form">
        <div class="form-group">
          <label for="travelerName">Name</label>
          <input type="text" id="travelerName" name="travelerName" required>
        </div>

        <div class="form-group">
          <label for="days">How many days will you stay?</label>
          <select id="days" name="days" required>
            <option value="" disabled selected>Select an option</option>
            <option value="1-2">1 to 2 days</option>
            <option value="3-4">3 to 4 days</option>
            <option value="5+">5 or more days</option>
          </select>
        </div>

        <fieldset class="form-group">
          <legend>Main interests</legend>
          <label><input type="checkbox" name="interest" value="Coastal views"> Coastal views</label>
          <label><input type="checkbox" name="interest" value="History"> History</label>
          <label><input type="checkbox" name="interest" value="Food"> Food</label>
          <label><input type="checkbox" name="interest" value="Culture"> Culture</label>
        </fieldset>

        <div class="form-group">
          <label for="notes">Notes</label>
          <textarea id="notes" name="notes" rows="5"></textarea>
        </div>

        <button class="button" type="submit">Save My Plan</button>
      </form>

      <section class="saved-plan" aria-labelledby="savedPlanTitle">
        <h2 id="savedPlanTitle">Saved Plan</h2>
        <div id="planOutput">
          <p>No saved plan yet.</p>
        </div>
      </section>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-grid">
      <p>&copy; <span id="currentyear"></span> Omar Lizandro | Lima Travel Guide</p>
      <p id="lastModified"></p>
      <p><a href="references.html">References</a></p>
    </div>
  </footer>
</body>
</html>
