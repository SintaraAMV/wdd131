<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" role="img" aria-labelledby="title desc">
  <title id="title">Partly cloudy weather icon</title>
  <desc id="desc">A simple partly cloudy weather icon with a sun behind a cloud.</desc>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Sun -->
  <g fill="none" stroke="#F59E0B" stroke-width="6" stroke-linecap="round">
    <line x1="42" y1="14" x2="42" y2="2"/>
    <line x1="42" y1="58" x2="42" y2="70"/>
    <line x1="20" y1="36" x2="8" y2="36"/>
    <line x1="64" y1="36" x2="76" y2="36"/>
    <line x1="26.4" y1="20.4" x2="18" y2="12"/>
    <line x1="57.6" y1="51.6" x2="66" y2="60"/>
    <line x1="26.4" y1="51.6" x2="18" y2="60"/>
    <line x1="57.6" y1="20.4" x2="66" y2="12"/>
  </g>
  <circle cx="42" cy="36" r="18" fill="#FBBF24" stroke="#D97706" stroke-width="4"/>

  <!-- Cloud -->
  <g filter="url(#shadow)">
    <path
      d="M42 88h38c13.3 0 24-9.8 24-22 0-11.8-10-21.3-22.5-21.9C77.6 32.5 67.2 24 55 24c-14.4 0-26.2 11.5-26.9 25.8C15.6 50.7 6 60.1 6 72c0 8.8 5.3 16.3 12.9 19.8C22.8 93.6 29 96 42 96Z"
      fill="#F8FAFC"
      stroke="#475569"
      stroke-width="4"
      stroke-linejoin="round"
    />
  </g>
</svg>
