<!doctype html>
<html lang="en-US">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WDD 131 - Product Review Form - Omar Lizandro</title>
  <meta
    name="description"
    content="Product review form for WDD 131 with dynamic product options and review confirmation."
  >
  <meta name="author" content="Omar Lizandro">
  <link rel="stylesheet" href="styles/form.css">
  <script src="scripts/form.js" defer></script>
</head>
<body>
  <header class="site-header">
    <h1>Product Review</h1>
  </header>

  <main class="page">
    <form class="review-form" method="get" action="review.html">
      <p class="required-note"><span class="required">*</span> Required field</p>

      <div class="form-group">
        <label for="productName">Product Name <span class="required">*</span></label>
        <select id="productName" name="productName" required>
          <option value="" disabled selected>Select a Product ...</option>
        </select>
      </div>

      <fieldset class="form-group">
        <legend>Overall Rating <span class="required">*</span></legend>

        <div class="rating-group">
          <div class="rating-option">
            <label for="rating1">★☆☆☆☆</label>
            <input type="radio" id="rating1" name="overallRating" value="1" required>
          </div>

          <div class="rating-option">
            <label for="rating2">★★☆☆☆</label>
            <input type="radio" id="rating2" name="overallRating" value="2" required>
          </div>

          <div class="rating-option">
            <label for="rating3">★★★☆☆</label>
            <input type="radio" id="rating3" name="overallRating" value="3" required>
          </div>

          <div class="rating-option">
            <label for="rating4">★★★★☆</label>
            <input type="radio" id="rating4" name="overallRating" value="4" required>
          </div>

          <div class="rating-option">
            <label for="rating5">★★★★★</label>
            <input type="radio" id="rating5" name="overallRating" value="5" required>
          </div>
        </div>
      </fieldset>

      <div class="form-group">
        <label for="installDate">Date of Installation <span class="required">*</span></label>
        <input type="date" id="installDate" name="installDate" required>
      </div>

      <fieldset class="form-group">
        <legend>Which features did you find useful in the product? <span class="optional">(Check all that apply)</span></legend>

        <div class="checkbox-group">
          <label><input type="checkbox" id="durability" name="features" value="Durability"> Durability</label>
          <label><input type="checkbox" id="easeOfUse" name="features" value="Ease of Use"> Ease of Use</label>
          <label><input type="checkbox" id="performance" name="features" value="Performance"> Performance</label>
          <label><input type="checkbox" id="design" name="features" value="Design"> Design</label>
        </div>
      </fieldset>

      <div class="form-group">
        <label for="writtenReview">Written Review <span class="optional">(Optional)</span></label>
        <textarea id="writtenReview" name="writtenReview" rows="5"></textarea>
      </div>

      <div class="form-group">
        <label for="userName">Your Name <span class="optional">(Optional)</span></label>
        <input type="text" id="userName" name="userName">
      </div>

      <input class="submit-button" type="submit" value="Post Review">
    </form>
  </main>

  <footer class="site-footer">
    <p>&copy; <span id="currentyear"></span> Omar Lizandro | Peru</p>
    <p id="lastModified"></p>
  </footer>
</body>
</html>
